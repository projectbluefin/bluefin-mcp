name: Track Bluefin Changes

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly, Sunday midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Track Bluefin changes and file issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/track-bluefin-changes.py

      - name: Commit updated tracking state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracking/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update Bluefin tracking state $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
